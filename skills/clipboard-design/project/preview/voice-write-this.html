<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Voice — Write this, not this</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .card{width:700px;background:#fff;border:1px solid var(--cb-border);border-radius:var(--radius-xl);padding:24px 28px;}
  table{width:100%;border-collapse:collapse;}
  th{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cb-muted);text-align:left;padding:0 0 10px;font-weight:500;}
  td{font-family:var(--font-sans);font-size:13px;color:var(--cb-navy);padding:8px 0;border-top:1px solid var(--cb-border);}
  td.bad{color:var(--cb-muted);text-decoration:line-through;}
  td.good{font-weight:500;}
  td:first-child{padding-right:20px;}
</style>
</head>
<body class="cb">
<div class="card">
  <table>
    <thead><tr><th>Write this</th><th>Not this</th></tr></thead>
    <tbody>
      <tr><td class="good">Your business, handled.</td><td class="bad">Experience the future of AI-powered automation.</td></tr>
      <tr><td class="good">Get started free</td><td class="bad">Begin your journey today</td></tr>
      <tr><td class="good">Agents that run your back office</td><td class="bad">Leverage intelligent multi-agent orchestration</td></tr>
      <tr><td class="good">14 tasks complete</td><td class="bad">Successfully processed 14 workflow items</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
