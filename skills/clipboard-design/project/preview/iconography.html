<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .card{width:700px;background:#fff;border:1px solid var(--cb-border);border-radius:var(--radius-xl);padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:14px;align-items:center;}
  .cell{width:60px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--cb-border);}
  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cb-muted);width:90px;flex-shrink:0;}
  .note{font-family:var(--font-sans);font-size:12px;color:var(--cb-muted-2);}
  svg{display:block;}
</style>
</head>
<body class="cb">
<div class="card">
  <div class="row">
    <span class="eyebrow">Default</span>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#12192B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M9 3h6v4H9z"/><path d="M8 12l3 3 5-6"/></svg></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#12192B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#12192B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#12192B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12l-8 8-8-8 8-8z"/></svg></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#12192B" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <span class="note">Navy · 1.75px stroke · rounded caps</span>
  </div>
  <div class="row">
    <span class="eyebrow">Status</span>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F6C94E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7B52E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9 1.65 1.65 0 0 0 4.27 7.18l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2BBFAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    <span class="note">Accent colors ONLY for status (yellow=contracts, violet=agents, teal=success)</span>
  </div>
</div>
</body>
</html>
