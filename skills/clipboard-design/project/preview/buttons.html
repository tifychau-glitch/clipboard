<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .card{width:700px;background:#fff;border:1px solid var(--cb-border);border-radius:var(--radius-xl);padding:32px 36px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;}
  button{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:-0.01em;border:none;cursor:pointer;padding:13px 26px;border-radius:10px;transition:all .15s var(--ease-out);}
  .navy{background:#12192B;color:#fff;}
  .violet{background:#7B52E8;color:#fff;}
  .yellow{background:#F6C94E;color:#12192B;}
  .outline{background:transparent;color:#12192B;border:1.5px solid var(--cb-border);padding:12px 26px;}
  .ghost{background:transparent;color:#12192B;}
  .small{font-size:12px;padding:8px 14px;border-radius:8px;}
</style>
</head>
<body class="cb">
<div class="card">
  <button class="navy">Get started free</button>
  <button class="violet">Explore templates →</button>
  <button class="yellow">Contract ready</button>
  <button class="outline">Watch demo</button>
  <button class="ghost">Cancel</button>
  <button class="navy small">+ New agent</button>
</div>
</body>
</html>
