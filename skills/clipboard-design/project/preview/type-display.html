<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .card{width:700px;height:260px;background:#fff;border:1px solid var(--cb-border);border-radius:var(--radius-xl);padding:32px 36px;display:flex;flex-direction:column;justify-content:center;gap:12px;}
  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cb-muted);}
  .display{font-family:var(--font-display);font-weight:800;font-size:64px;line-height:0.98;letter-spacing:-0.035em;color:var(--cb-navy);}
  .accent{color:#7B52E8;}
  .outline{-webkit-text-stroke:2px #2BBFAD;color:transparent;}
</style>
</head>
<body class="cb">
<div class="card">
  <div class="eyebrow">Bricolage Grotesque 800 · Display</div>
  <div class="display">Work <span class="accent">less.</span><br/><span class="outline">Do more.</span></div>
</div>
</body>
</html>
