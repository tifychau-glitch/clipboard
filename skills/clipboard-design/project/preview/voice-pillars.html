<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Brand Voice Pillars</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .card{width:700px;background:#12192B;border-radius:var(--radius-xl);padding:32px 36px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative;overflow:hidden;}
  .card::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);background-size:48px 48px;}
  .col{position:relative;}
  .word{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-0.02em;margin-bottom:8px;}
  .desc{font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.45);line-height:1.55;font-weight:300;}
</style>
</head>
<body class="cb">
<div class="card">
  <div class="col"><div class="word" style="color:#F6C94E">Simple</div><div class="desc">No config. No engineers. Click and run.</div></div>
  <div class="col"><div class="word" style="color:#7B52E8">Modern</div><div class="desc">Built for how business works in 2025.</div></div>
  <div class="col"><div class="word" style="color:#2BBFAD">Reliable</div><div class="desc">Shows up every day. Does the work.</div></div>
  <div class="col"><div class="word" style="color:#fff">Yours</div><div class="desc">Niche-built templates that fit your business.</div></div>
</div>
</body>
</html>
