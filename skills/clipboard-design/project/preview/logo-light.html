<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Logo — Light</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .card{width:700px;height:180px;background:var(--cb-surface);border:1px solid var(--cb-border);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;gap:16px;}
  .mark{flex-shrink:0}
  .word{font-family:var(--font-display);font-weight:800;font-size:44px;color:var(--cb-navy);letter-spacing:-1.32px;line-height:1;}
</style>
</head>
<body class="cb">
<div class="card">
  <svg width="72" height="72" viewBox="0 0 48 48" fill="none">
    <rect x="6" y="10" width="36" height="33" rx="5" fill="#FFFFFF"/>
    <path d="M14 10 H24" stroke="#F6C94E" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M24 10 H34" stroke="#2BBFAD" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M6 14 V43" stroke="#F6C94E" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M42 14 V43" stroke="#2BBFAD" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M6 43 H42" stroke="#7B52E8" stroke-width="3.5" stroke-linecap="round"/>
    <rect x="17" y="6" width="14" height="8" rx="4" fill="#12192B"/>
    <rect x="20" y="8" width="8" height="4" rx="2" fill="#FFFFFF"/>
    <path d="M16 27 L21.5 33 L32 20" stroke="#12192B" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span class="word">clipboard</span>
</div>
</body>
</html>
