<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Type — Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--cb-bg);}
  .wrap{width:700px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .card{background:#fff;border:1px solid var(--cb-border);border-radius:var(--radius-xl);padding:22px 22px 20px;min-height:160px;display:flex;flex-direction:column;justify-content:space-between;}
  .eyebrow{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cb-muted);}
  .big{font-size:40px;line-height:1;color:var(--cb-navy);letter-spacing:-0.03em;margin:12px 0;}
  .meta{font-family:var(--font-mono);font-size:9px;color:var(--cb-muted);letter-spacing:0.1em;}
</style>
</head>
<body class="cb">
<div class="wrap">
  <div class="card">
    <div class="eyebrow">Display</div>
    <div class="big" style="font-family:var(--font-display);font-weight:800;">Aa</div>
    <div class="meta">Bricolage Grotesque<br/>400 · 500 · 600 · 700 · 800</div>
  </div>
  <div class="card">
    <div class="eyebrow">Body</div>
    <div class="big" style="font-family:var(--font-sans);font-weight:400;">Aa</div>
    <div class="meta">DM Sans<br/>300 · 400 · 500</div>
  </div>
  <div class="card">
    <div class="eyebrow">Mono</div>
    <div class="big" style="font-family:var(--font-mono);font-weight:500;">Aa</div>
    <div class="meta">DM Mono<br/>400 · 500</div>
  </div>
</div>
</body>
</html>
